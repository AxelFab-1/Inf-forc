<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header>

    </header>
    <main>
        <div class="login-card">
            <div class="text-center">
                <div class="logo-placeholder">GYM</div>
                <h4 class="mb-4 fw-bold">Acceso a Socios</h4>
            </div>
        
            <form class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="codigoAcceso" class="form-label fw-semibold">Código de Acceso</label>
                    <input type="text" class="form-control" id="codigoAcceso" placeholder="Ej. 10045" required>
                    <div class="invalid-feedback">
                        Ingresa el código que te dieron en recepción.
                    </div>
                </div>
        
                <div class="mb-4">
                    <label for="dniContrasena" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="dniContrasena" placeholder="Tu número de DNI" required>
                    <div class="invalid-feedback">
                        Ingresa tu contraseña.
                    </div>
                </div>
        
                <button type="submit" class="btn btn-warning-custom w-100 py-2 fs-5">Entrar</button>
        
                <div class="help-text">
                    Si es tu primera vez ingresando, usa tu DNI como contraseña.
                </div>
            </form>
        </div>

        
    </main>
    <footer>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
