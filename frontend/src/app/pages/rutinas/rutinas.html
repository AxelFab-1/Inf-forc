<div class="body-app bg-gym-dark text-dark rutinas-container">
    <header class="fixed-top border-bottom border-gym shadow-sm bg-gym-dark">
        <div class="container d-flex align-items-center p-3">
            <a routerLink="/entrenar" class="text-dark text-decoration-none me-3">
                <i class="bi bi-arrow-left fs-3"></i>
            </a>
            <h4 class="mb-0 fw-bold text-gold">Nuestras Rutinas</h4>
        </div>
    </header>

    <main class="container pt-5 rutinas-main">
        
        <div class="d-flex justify-content-center gap-3 mb-4">
            <button (click)="filtrarPlantillas('predeterminada')" 
                    class="btn fw-bold px-3 py-2 rounded-pill" 
                    [ngClass]="tipoSeleccionado === 'predeterminada' ? 'btn-warning text-dark' : 'btn-outline-warning'">
                Predeterminadas
            </button>
            <button (click)="filtrarPlantillas('personalizada')" 
                    class="btn fw-bold px-3 py-2 rounded-pill" 
                    [ngClass]="tipoSeleccionado === 'personalizada' ? 'btn-warning text-dark' : 'btn-outline-warning'">
                Armar Personalizada
            </button>
        </div>

        <div id="contenedorPlantillas" class="row g-3">
            <div class="col-12" *ngFor="let plantilla of plantillasMostradas">
                <div class="card p-3 d-flex flex-column gap-2 bg-gym-dark-secondary border-gym">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-lightning-charge fs-1 text-gold"></i>
                        <div class="flex-grow-1">
                            <h5 class="fw-bold text-dark mb-1">{{ plantilla.nombre }}</h5>
                            <p class="small text-muted mb-2">{{ plantilla.descripcion }}</p>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button (click)="seleccionarPlantilla(plantilla)" class="btn fw-bold flex-grow-1 bg-gold">
                            {{ plantilla.tipo === 'predeterminada' ? 'Elegir esta Rutina' : 'Empezar a Armar' }}
                        </button>
                        <button (click)="abrirModalInfo(plantilla)" class="btn btn-outline-dark fw-bold px-3">
                            <i class="bi bi-info-circle"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div *ngIf="plantillasMostradas.length === 0" class="col-12 text-center text-muted mt-4">
                <p>No se encontraron rutinas disponibles.</p>
            </div>
        </div>
        
    </main>

    <!-- Modal Info Plantilla -->
    <div class="modal fade modal-custom-z" id="infoPlantillaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content text-dark border-gym bg-gym-dark">
          <div class="modal-header border-gym">
            <h5 class="modal-title fw-bold text-gold">
              <i class="bi bi-card-list me-2"></i>Detalles de la Rutina
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" *ngIf="plantillaEnModal">
            <h4 class="fw-bold mb-3">{{ plantillaEnModal.nombre }}</h4>
            <p class="text-muted mb-4">{{ plantillaEnModal.descripcion }}</p>
            
            <div class="accordion accordion-flush" id="accordionDias">
              <div class="accordion-item bg-transparent border-0" *ngFor="let dia of plantillaEnModal.dias; let i = index">
                <h2 class="accordion-header" [id]="'headingDia' + i">
                  <button class="accordion-button collapsed fw-bold accordion-button-custom" type="button" data-bs-toggle="collapse" 
                          [attr.data-bs-target]="'#collapseDia' + i">
                    {{ dia.nombreDia }}
                  </button>
                </h2>
                <div [id]="'collapseDia' + i" class="accordion-collapse collapse" [attr.data-bs-parent]="'#accordionDias'">
                  <div class="accordion-body accordion-body-custom bg-gym-dark">
                    
                    <div *ngIf="!dia.ejerciciosBase || dia.ejerciciosBase.length === 0" class="text-muted small ms-3">
                      No hay ejercicios asignados.
                    </div>

                    <div *ngFor="let ej of dia.ejerciciosBase" class="d-flex align-items-center gap-3 mb-3 px-3">
                      <div class="rounded overflow-hidden ej-img-container bg-black border-gym">
                        <img *ngIf="ej.imagenUrl" [src]="ej.imagenUrl" alt="GIF de {{ ej.nombre }}" 
                             class="ej-img">
                        <i *ngIf="!ej.imagenUrl" class="bi bi-image text-muted fs-4"></i>
                      </div>
                      <div>
                        <p class="fw-bold mb-0 text-dark">{{ ej.nombre }}</p>
                        <small class="text-muted">{{ ej.grupoMuscular || 'Grupo' }}</small>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </div>

          </div>

          <div class="modal-footer border-gym">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
          </div>
        </div>
      </div>
    </div>
</div>
