<div class="body-login text-dark d-flex align-items-center" style="min-height: 100vh; width: 100%">
  <main class="w-100 d-flex justify-content-center">
    <div class="login-card">
      <div class="text-center">
        <div
          class="bg-black text-gold rounded-circle d-flex align-items-center justify-content-center fw-bold fs-3 mx-auto mb-4 border border-3 shadow"
          style="width: 90px; height: 90px; border-color: var(--gym-gold) !important"
        >
          GYM
        </div>
        <h4 class="mb-4 fw-bold">Acceso a Socios</h4>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="hacerLogin()" novalidate>
        
        <div
          *ngIf="mensajeError"
          class="alert alert-danger alert-dismissible fade show mb-4"
          role="alert"                                
        >
          <strong>¡Error!</strong> {{ mensajeError }}
          <button
            type="button"
            class="btn-close"
            (click)="mensajeError = ''"
            aria-label="Close"
          ></button>
        </div>

        <div class="mb-3">
          <label for="codigoAcceso" class="form-label fw-semibold">Código de Acceso</label>
          <input
            type="text"
            formControlName="codigo"
            (input)="limpiarCodigoLetras($event)"
            inputmode="numeric"
            maxlength="5"
            class="form-control"
            [ngClass]="{'is-invalid': loginForm.get('codigo')?.invalid && loginForm.get('codigo')?.touched}"
            id="codigoAcceso"
            placeholder="Ej: 10045"
          />
          <div *ngIf="loginForm.get('codigo')?.invalid && loginForm.get('codigo')?.touched" class="invalid-feedback">
            <span *ngIf="loginForm.get('codigo')?.hasError('required')">El código es obligatorio.</span>
            <span *ngIf="loginForm.get('codigo')?.hasError('minlength')">Debe tener exactamente 5 dígitos.</span>
          </div>
        </div>

        <div class="mb-4">
          <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              formControlName="contrasena"
              maxlength="50"
              class="form-control"
              [ngClass]="{'is-invalid': loginForm.get('contrasena')?.invalid && loginForm.get('contrasena')?.touched}"
              id="contrasena"
              placeholder="Ingresa tu contraseña"
            />
            <button 
              class="btn btn-outline-secondary" 
              type="button" 
              (click)="mostrarPassword = !mostrarPassword"
              style="border-color: #dee2e6;">
              <i class="bi" [ngClass]="mostrarPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
            <div *ngIf="loginForm.get('contrasena')?.invalid && loginForm.get('contrasena')?.touched" class="invalid-feedback w-100">
              La contraseña es obligatoria.
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-gold w-100 py-2 fs-5">Entrar</button>

        <div class="help-text mt-3 text-center" style="font-size: 0.85rem">
          Si es tu primera vez ingresando, usa tu DNI como contraseña.
        </div>
      </form>
    </div>
  </main>
</div>
