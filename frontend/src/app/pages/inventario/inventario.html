<div class="master-detail-layout">

  <aside class="detail-panel">

    <div class="panel-header">
      <h5 class="mb-0 fw-bold text-gold">
        <i class="bi" [ngClass]="modo === 'crear' ? 'bi-plus-circle-fill' : 'bi-pencil-fill'"></i>
        {{ modo === 'crear' ? 'Nuevo Producto' : 'Editar Producto' }}
      </h5>
      <button *ngIf="modo === 'editar'" class="btn btn-sm btn-outline-secondary rounded-pill"
              (click)="limpiarPanel()">
        <i class="bi bi-x-lg me-1"></i> Limpiar
      </button>
    </div>

    <div *ngIf="alerta" class="alert alert-{{ alerta.tipo }} alert-dismissible py-2 px-3 mb-3 small" role="alert">
      {{ alerta.mensaje }}
      <button type="button" class="btn-close btn-sm" (click)="cerrarAlerta()"></button>
    </div>

    <form *ngIf="modo === 'crear'" [formGroup]="registroForm" (ngSubmit)="crearProducto()">

      <div class="mb-3">
        <label class="form-label text-gold fw-semibold small">Nombre</label>
        <input type="text" formControlName="nombre" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
               [ngClass]="{'is-invalid': registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched}" />
      </div>

      <div class="mb-3">
        <label class="form-label text-gold fw-semibold small">Categoría</label>
        <select formControlName="categoria" class="form-select form-select-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
                [ngClass]="{'is-invalid': registroForm.get('categoria')?.invalid && registroForm.get('categoria')?.touched}">
          <option value="" disabled selected>Selecciona...</option>
          <option *ngFor="let cat of categorias" [value]="cat">{{ cat | titlecase }}</option>
        </select>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label text-gold fw-semibold small">Precio (S/)</label>
          <input type="number" formControlName="precio" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
                 [ngClass]="{'is-invalid': registroForm.get('precio')?.invalid && registroForm.get('precio')?.touched}" />
        </div>
        <div class="col-6">
          <label class="form-label text-gold fw-semibold small">Stock</label>
          <input type="number" formControlName="stock" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
                 [ngClass]="{'is-invalid': registroForm.get('stock')?.invalid && registroForm.get('stock')?.touched}" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-gold fw-semibold small">Imagen del Producto</label>
        <input type="file" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
               accept="image/*" (change)="onFileSelected($event)" required />
      </div>

      <button type="submit" class="btn w-100 fw-bold py-2 bg-gold fs-6">
        <i class="bi bi-plus-circle me-1"></i> Guardar Producto
      </button>
    </form>

    <form *ngIf="modo === 'editar'" [formGroup]="editarForm" (ngSubmit)="guardarEdicion()">

      <div class="mb-3">
        <label class="form-label text-gold fw-semibold small">Nombre</label>
        <input type="text" formControlName="nombre" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
               [ngClass]="{'is-invalid': editarForm.get('nombre')?.invalid && editarForm.get('nombre')?.touched}" />
      </div>

      <div class="mb-3">
        <label class="form-label text-gold fw-semibold small">Categoría</label>
        <select formControlName="categoria" class="form-select form-select-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
                [ngClass]="{'is-invalid': editarForm.get('categoria')?.invalid && editarForm.get('categoria')?.touched}">
          <option *ngFor="let cat of categorias" [value]="cat">{{ cat | titlecase }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label text-gold fw-semibold small">Precio (S/)</label>
        <input type="number" formControlName="precio" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
               [ngClass]="{'is-invalid': editarForm.get('precio')?.invalid && editarForm.get('precio')?.touched}" />
      </div>

      <div class="mb-4">
        <label class="form-label text-gold fw-semibold small">Nueva Imagen (Opcional)</label>
        <input type="file" class="form-control form-control-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
               accept="image/*" (change)="onFileSelected($event)" />
        
        <div *ngIf="productoSeleccionado?.imagenUrl" class="mt-2 text-center">
          <small class="text-muted d-block mb-1">Imagen actual:</small>
          <img [src]="productoSeleccionado.imagenUrl" class="img-preview rounded"
               (error)="$any($event.target).src='https://placehold.co/120x80'" style="max-height: 80px;" />
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn fw-bold py-2 flex-grow-1 bg-gold">
          <i class="bi bi-check-lg me-1"></i> Actualizar
        </button>
        <button type="button" class="btn btn-outline-danger fw-bold py-2"
                (click)="eliminarProducto()">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </form>

  </aside>

  <main class="master-zone">

    <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
      <div class="flex-grow-1" style="min-width: 180px;">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-gym-dark-secondary border-gym text-muted">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" class="form-control bg-gym-dark-secondary border-gym text-dark shadow-none"
                 placeholder="Buscar producto..."
                 [(ngModel)]="textoBusqueda"
                 (input)="aplicarFiltros()" />
        </div>
      </div>

      <select class="form-select form-select-sm bg-gym-dark-secondary border-gym text-dark shadow-none"
              style="max-width: 160px;"
              [(ngModel)]="filtroCategoria"
              (change)="aplicarFiltros()">
        <option value="">Todas las categorías</option>
        <option *ngFor="let cat of categorias" [value]="cat">{{ cat | titlecase }}</option>
      </select>

      <button class="btn btn-outline-secondary btn-sm" (click)="limpiarFiltros()"
              *ngIf="textoBusqueda || filtroCategoria">
        <i class="bi bi-x-circle me-1"></i> Limpiar
      </button>

      <span class="text-muted small ms-auto">
        {{ productosFiltrados.length }} producto(s)
      </span>
    </div>

    <div *ngIf="productosFiltrados.length === 0" class="text-center text-muted py-5">
      <i class="bi bi-box-seam fs-1 mb-3 d-block opacity-50"></i>
      <p class="mb-0">No se encontraron productos.</p>
    </div>

    <div class="products-grid">
      <div *ngFor="let prod of productosFiltrados"
           class="product-card"
           [ngClass]="{ 'product-card--selected': productoSeleccionado?._id === prod._id || productoSeleccionado?.id === prod.id, 'product-card--inactive': !prod.activo }"
           (click)="seleccionarProducto(prod)">

        <div class="product-img-wrapper">
          <img [src]="prod.imagenUrl" class="product-img"
               (error)="$any($event.target).src='https://placehold.co/200x140'" />
          <span class="badge-categoria">{{ prod.categoria | titlecase }}</span>
        </div>

        <div class="product-info">
          <h6 class="product-name">{{ prod.nombre }}</h6>
          <div class="product-footer">
            <span class="product-precio">S/ {{ prod.precio | number:'1.2-2' }}</span>
            <button class="btn btn-xs fw-bold"
                    [ngClass]="prod.activo ? 'btn-outline-success' : 'btn-outline-danger'"
                    (click)="$event.stopPropagation(); toggleDisponibilidad(prod)">
              {{ prod.activo ? 'Disponible' : 'Agotado' }}
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

</div>
