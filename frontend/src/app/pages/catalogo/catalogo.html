<div class="body-app bg-gym-dark text-dark" style="padding-bottom: 80px; padding-top: 85px; min-height: 100vh;">
    <app-header></app-header>

    <main class="container">
        <h2 class="fw-bold mb-4 mt-3 text-gold">Catálogo</h2>

        <div class="mb-4">
            <h6 class="text-muted fw-bold mb-3">Categorías</h6>
            
            <div class="scroll-horizontal d-flex gap-2 overflow-auto pb-2" id="contenedorFiltros" style="white-space: nowrap;">
                
                <div class="tarjeta-categoria p-2 text-center flex-shrink-0" style="cursor: pointer;"
                     [ngClass]="{'categoria-activa': categoriaActiva === 'todos'}" 
                     (click)="filtrar('todos')">
                    <div class="mb-1"><i class="bi bi-collection-fill fs-3"></i></div>
                    <span class="small fw-bold">Todos</span>
                </div>

                <div class="tarjeta-categoria p-2 text-center flex-shrink-0" style="cursor: pointer;"
                     [ngClass]="{'categoria-activa': categoriaActiva === 'suplementos'}" 
                     (click)="filtrar('suplementos')">
                    <div class="mb-1"><i class="bi bi-cup-straw fs-3"></i></div>
                    <span class="small fw-bold">Suplementos</span>
                </div>

                <div class="tarjeta-categoria p-2 text-center flex-shrink-0" style="cursor: pointer;"
                     [ngClass]="{'categoria-activa': categoriaActiva === 'ropa'}" 
                     (click)="filtrar('ropa')">
                    <div class="mb-1"><i class="bi bi-person-arms-up fs-3"></i></div>
                    <span class="small fw-bold">Ropa</span>
                </div>

                <div class="tarjeta-categoria p-2 text-center flex-shrink-0" style="cursor: pointer;"
                     [ngClass]="{'categoria-activa': categoriaActiva === 'accesorios'}" 
                     (click)="filtrar('accesorios')">
                    <div class="mb-1"><i class="bi bi-smartwatch fs-3"></i></div>
                    <span class="small fw-bold">Accesorios</span>
                </div>
            </div>
        </div>

        <div *ngIf="errorMensaje" class="text-center text-muted my-5">
            <p>{{ errorMensaje }}</p>
        </div>

        <h6 class="text-muted fw-bold mb-3">Destacados</h6>

        <div *ngIf="productosFiltrados.length === 0 && !errorMensaje" class="text-center text-muted mt-4 w-100">
            <p>No hay productos en esta categoría.</p>
        </div>

        <div class="row row-cols-2 row-cols-md-3 g-3 mb-4" id="contenedorProductos">
            <div class="col item-producto" *ngFor="let prod of productosFiltrados">
                <div class="card card-producto h-100 shadow-sm border-gym bg-gym-dark-secondary">
                    
                    <img [src]="prod.imagenUrl" class="card-img-top producto-img" [alt]="prod.nombre" 
                         (error)="manejarErrorImagen($event)" 
                         style="object-fit: contain; height: 140px; background-color: var(--gym-border);"
                         [style.opacity]="prod.activo ? '1' : '0.4'">
                    
                    <div class="card-body p-3 text-dark text-center">
                        <h6 class="card-title fw-bold small text-truncate mb-2">{{ prod.nombre }}</h6>
                        <p class="card-text fw-bold mb-0 fs-5 text-gold">S/ {{ prod.precio | number:'1.2-2' }}</p>
                        
                        <span class="badge mt-2" 
                              [ngClass]="prod.activo ? 'bg-success' : 'bg-danger'" 
                              style="font-size: 0.65rem; opacity: 0.8;">
                            {{ prod.activo ? 'Disponible' : 'Agotado' }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <app-footer-menu></app-footer-menu>
</div>
