<header class="fixed-top border-bottom border-dark shadow-sm" style="background-color: #1a1a1a">
  <div class="container d-flex justify-content-between align-items-center p-3">
    
    <div class="position-relative">
      <div class="d-flex align-items-center" (click)="toggleMenu()" style="cursor: pointer;">
        <img [src]="avatarUrl" alt="Perfil" class="rounded-circle me-2" width="45" height="45" style="object-fit: cover; border: 2px solid #ffd700;" />
        <span class="fw-bold fs-5" style="color: #ffffff">{{ codigoSocio }}</span>
        <i class="bi bi-caret-down-fill ms-2" style="color: #ffd700"></i>
      </div>

      <div *ngIf="menuAbierto" class="dropdown-menu show shadow p-0" 
           style="position: absolute; top: 60px; left: 0; background-color: #2c2c2c; border: 1px solid #ffd700; min-width: 180px; overflow: hidden; border-radius: 8px;">
        
        <a routerLink="/perfil" class="custom-dropdown-item text-decoration-none d-block">
          <i class="bi bi-person-circle me-2"></i> Mi Perfil
        </a>
        
        <button class="custom-dropdown-item" (click)="abrirModalCambioClave()">
          <i class="bi bi-key me-2"></i> Cambiar Clave
        </button>
        
        <hr class="dropdown-divider border-secondary m-0">
        
        <button class="custom-dropdown-item text-danger" (click)="cerrarSesion()">
          <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
        </button>
      </div>
    </div>
    
    <div class="d-flex align-items-center">
      <i class="bi bi-bell-fill fs-3" style="color: #ffd700; cursor: pointer" title="Notificaciones"></i>
    </div>
  </div>
</header>

<div *ngIf="mostrarModalCambioClave" class="modal-overlay d-flex justify-content-center align-items-center">
  <div class="modal-content p-4 rounded shadow bg-dark border" style="width: 400px; border-color: #ffd700 !important;">
    <h4 class="text-white mb-3">Cambiar Contraseña</h4>

    <div *ngIf="mensajeModal" class="alert alert-{{mensajeModal.tipo}} py-2 mb-3 fs-6 shadow-sm" role="alert">
      {{ mensajeModal.texto }}
    </div>

    <form [formGroup]="cambioClaveForm" (ngSubmit)="guardarNuevaClave()">
      
      <div class="mb-3">
        <input formControlName="claveActual" type="password" 
               class="form-control input-oscuro shadow-none" 
               [ngClass]="{'is-invalid': cambioClaveForm.get('claveActual')?.invalid && cambioClaveForm.get('claveActual')?.touched}"
               placeholder="Clave Actual">
      </div>

      <div class="mb-3">
        <input formControlName="nuevaClave" type="password" 
               class="form-control input-oscuro shadow-none" 
               [ngClass]="{'is-invalid': cambioClaveForm.get('nuevaClave')?.invalid && cambioClaveForm.get('nuevaClave')?.touched}"
               placeholder="Nueva Clave (Mín. 8 caracteres)">
        <div *ngIf="cambioClaveForm.get('nuevaClave')?.hasError('minlength') && cambioClaveForm.get('nuevaClave')?.touched" class="text-danger small mt-1">
          La clave debe tener al menos 8 caracteres.
        </div>
      </div>

      <div class="mb-3">
        <input formControlName="confirmarNuevaClave" type="password" 
               class="form-control input-oscuro shadow-none" 
               [ngClass]="{'is-invalid': (cambioClaveForm.get('confirmarNuevaClave')?.invalid || cambioClaveForm.hasError('mismatch')) && cambioClaveForm.get('confirmarNuevaClave')?.touched}"
               placeholder="Confirmar Nueva Clave">
        <div *ngIf="cambioClaveForm.hasError('mismatch') && cambioClaveForm.get('confirmarNuevaClave')?.touched" class="text-danger small mt-1">
          Las contraseñas no coinciden.
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-light me-2" (click)="cerrarModalCambioClave()">Cancelar</button>
        
        <button type="submit" class="btn fw-bold" 
                style="background-color: #ffd700; color: #000;" 
                [disabled]="cambioClaveForm.invalid">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
