<footer
  class="fixed-bottom border-top border-gym bg-gym-dark"
  style="z-index: 1040"
>
  <div class="container d-flex justify-content-around py-2">
    <a
      routerLink="/dashboard"
      routerLinkActive="text-gold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn btn-link text-decoration-none d-flex flex-column align-items-center p-1 text-muted"
    >
      <i class="bi bi-house-door-fill fs-4"></i>
      <span style="font-size: 0.75rem; font-weight: bold">Inicio</span>
    </a>

    <a
      routerLink="/entrenar"
      routerLinkActive="text-gold"
      class="btn btn-link text-muted text-decoration-none d-flex flex-column align-items-center p-1"
    >
      <i class="bi bi-activity fs-4"></i>
      <span style="font-size: 0.75rem; font-weight: bold">Entrenar</span>
    </a>

    <a
      routerLink="/nutricion"
      routerLinkActive="text-gold"
      class="btn btn-link text-muted text-decoration-none d-flex flex-column align-items-center p-1"
    >
      <i class="bi bi-clipboard2-pulse fs-4"></i>
      <span style="font-size: 0.75rem; font-weight: bold">Nutrición</span>
    </a>

    <a
      routerLink="/catalogo"
      routerLinkActive="text-gold"
      class="btn btn-link text-muted text-decoration-none d-flex flex-column align-items-center p-1"
    >
      <i class="bi bi-journal-bookmark fs-4"></i>
      <span style="font-size: 0.75rem; font-weight: bold">Catálogo</span>
    </a>
  </div>
</footer>
